<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>overlay</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: transparent; overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    -webkit-user-select: none; user-select: none; cursor: default;
  }
  .pill {
    display: flex; align-items: center; gap: 10px;
    height: 44px; margin: 10px auto 0; padding: 0 18px 0 14px;
    width: max-content; max-width: 232px;
    background: rgba(20, 20, 28, 0.92);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    color: #f4f4f6; font-size: 13.5px; font-weight: 500;
    backdrop-filter: blur(12px);
    transition: opacity .15s ease;
  }
  .label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Recording: animated equalizer bars */
  .bars { display: flex; align-items: center; gap: 3px; height: 20px; }
  .bars span {
    width: 3px; height: 6px; border-radius: 2px; background: #818cf8;
    animation: bounce 0.9s infinite ease-in-out;
  }
  .bars span:nth-child(2){ animation-delay: .15s; }
  .bars span:nth-child(3){ animation-delay: .30s; }
  .bars span:nth-child(4){ animation-delay: .45s; }
  @keyframes bounce { 0%,100%{ height:6px } 50%{ height:20px } }

  /* Spinner for transcribing */
  .spin {
    width: 15px; height: 15px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25); border-top-color: #818cf8;
    animation: rot .7s linear infinite;
  }
  @keyframes rot { to { transform: rotate(360deg) } }

  .dot { width: 15px; height: 15px; display:flex; align-items:center; justify-content:center; font-size: 14px; }
  .ok { color: #34d399; }
  .warn { color: #fbbf24; }
</style>
</head>
<body>
  <div class="pill" id="pill">
    <div id="icon"></div>
    <div class="label" id="label">Ready</div>
  </div>
<script>
  const icon = document.getElementById('icon');
  const label = document.getElementById('label');

  const barsHTML = '<div class="bars"><span></span><span></span><span></span><span></span></div>';

  window.flow.onState(({ state, text }) => {
    if (state === 'recording') {
      icon.innerHTML = barsHTML;
      label.textContent = text || 'Listening…';
    } else if (state === 'transcribing') {
      icon.innerHTML = '<div class="spin"></div>';
      label.textContent = text || 'Transcribing…';
    } else if (state === 'inserting') {
      icon.innerHTML = '<div class="spin"></div>';
      label.textContent = text || 'Inserting…';
    } else if (state === 'done') {
      icon.innerHTML = '<div class="dot ok">✓</div>';
      label.textContent = text || 'Inserted';
    } else if (state === 'error') {
      icon.innerHTML = '<div class="dot warn">!</div>';
      label.textContent = text || 'Something went wrong';
    }
  });
</script>
</body>
</html>
