<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Murmur — History</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f6f6f8; color: #1a1a1e; display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 14px 16px 12px; border-bottom: 1px solid #e6e6ec; background: #fff;
    display: flex; flex-direction: column; gap: 10px;
  }
  .titlerow { display: flex; align-items: center; justify-content: space-between; }
  h1 { font-size: 15px; margin: 0; display: flex; align-items: center; gap: 7px; }
  .count { font-size: 12px; color: #86868f; font-weight: 500; }
  #search {
    width: 100%; padding: 8px 11px; font-size: 13px; border: 1px solid #d5d5dd;
    border-radius: 8px; outline: none; background: #fff; color: inherit;
  }
  #search:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.16); }
  .list { flex: 1; overflow-y: auto; padding: 10px 12px 16px; }
  .item {
    background: #fff; border: 1px solid #e6e6ec; border-radius: 10px;
    padding: 11px 12px; margin-bottom: 9px; transition: border-color .12s;
  }
  .item:hover { border-color: #c9c9d4; }
  .meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .time { font-size: 11px; color: #9a9aa6; }
  .actions { display: flex; gap: 6px; }
  .text { font-size: 13.5px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; cursor: text; }
  button {
    font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    border: none; border-radius: 6px; padding: 4px 10px; background: #ececf2; color: #33333c;
  }
  button:hover { filter: brightness(.96); }
  .copy.copied { background: #10b981; color: #fff; }
  .del { background: transparent; color: #c0c0ca; padding: 4px 7px; }
  .del:hover { background: #fdecec; color: #ef4444; }
  .clear { background: transparent; color: #9a9aa6; font-size: 11.5px; padding: 3px 8px; }
  .clear:hover { color: #ef4444; }
  .empty { text-align: center; color: #9a9aa6; font-size: 13px; margin-top: 60px; line-height: 1.6; }
  @media (prefers-color-scheme: dark) {
    body { background: #17171c; color: #eaeaf0; }
    header { background: #1e1e25; border-color: #2c2c35; }
    #search { background: #24242c; border-color: #3a3a44; color: #eaeaf0; }
    .item { background: #1e1e25; border-color: #2c2c35; }
    .item:hover { border-color: #3d3d48; }
    button { background: #2c2c35; color: #d5d5dd; }
    .del { background: transparent; color: #55555f; }
    .del:hover { background: #3a2626; color: #f87171; }
  }
</style>
</head>
<body>
  <header>
    <div class="titlerow">
      <h1>🕘 Transcript history <span class="count" id="count"></span></h1>
      <button class="clear" id="clearAll">Clear all</button>
    </div>
    <input id="search" type="text" placeholder="Search transcripts…" spellcheck="false" autocomplete="off">
  </header>
  <div class="list" id="list"></div>

<script>
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');
  const searchEl = document.getElementById('search');
  let items = [];

  function fmtTime(ts) {
    const d = new Date(ts);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    const t = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    return sameDay ? t : d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' · ' + t;
  }

  function render() {
    const q = searchEl.value.trim().toLowerCase();
    const shown = q ? items.filter((i) => i.text.toLowerCase().includes(q)) : items;
    countEl.textContent = items.length ? '(' + items.length + ')' : '';
    if (!shown.length) {
      listEl.innerHTML = '<div class="empty">' +
        (items.length ? 'No matches.' : 'Nothing yet.<br>Hold your key, speak, and your transcripts show up here.') +
        '</div>';
      return;
    }
    listEl.innerHTML = '';
    for (const it of shown) {
      const card = document.createElement('div');
      card.className = 'item';

      const meta = document.createElement('div');
      meta.className = 'meta';
      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = fmtTime(it.ts);
      const actions = document.createElement('div');
      actions.className = 'actions';

      const copy = document.createElement('button');
      copy.className = 'copy';
      copy.textContent = 'Copy';
      copy.onclick = async () => {
        await window.hist.copy(it.text);
        copy.textContent = 'Copied ✓';
        copy.classList.add('copied');
        setTimeout(() => { copy.textContent = 'Copy'; copy.classList.remove('copied'); }, 1200);
      };

      const del = document.createElement('button');
      del.className = 'del';
      del.title = 'Delete';
      del.textContent = '✕';
      del.onclick = async () => { items = await window.hist.remove(it.ts); render(); };

      actions.appendChild(copy);
      actions.appendChild(del);
      meta.appendChild(time);
      meta.appendChild(actions);

      const text = document.createElement('div');
      text.className = 'text';
      text.textContent = it.text;

      card.appendChild(meta);
      card.appendChild(text);
      listEl.appendChild(card);
    }
  }

  async function load() { items = await window.hist.get(); render(); }

  searchEl.addEventListener('input', render);
  document.getElementById('clearAll').onclick = async () => {
    if (confirm('Clear all saved transcripts?')) { items = await window.hist.clear(); render(); }
  };
  window.hist.onUpdate(load);
  load();
</script>
</body>
</html>
